# verl GRPO template for BlindSpot-RL.
# This file is intentionally conservative and may need small key-name updates
# for the exact verl version you run.

algorithm:
  adv_estimator: grpo

data:
  train_files:
    - data/processed/proxy_gold_verl.parquet
  val_files:
    - data/processed/proxy_gold_verl.parquet
  prompt_key: prompt
  max_prompt_length: 2048
  max_response_length: 1024

actor_rollout_ref:
  model:
    path: outputs/checkpoints/evaluation_criteria_policy_sft
  actor:
    optim:
      lr: 1.0e-6
    ppo_mini_batch_size: 32
    ppo_micro_batch_size_per_gpu: 2
  rollout:
    n: 4
    temperature: 0.7
    top_p: 0.95
  ref:
    log_prob_micro_batch_size_per_gpu: 2

reward_model:
  enable: false
  reward_manager: naive
  custom_reward_function:
    path: src/blindspot_rl/verl_reward.py
    name: compute_score

trainer:
  project_name: blindspot_rl
  experiment_name: bsc_grpo_full
  total_epochs: 1
  logger:
    - console
  default_local_dir: outputs/checkpoints/evaluation_criteria_policy_rl

# Suggested runtime env for the full reward:
# export BSC_EMBEDDING_MODEL=BAAI/bge-large-en-v1.5
# export BSC_COVERAGE_TAU=0.75
# export BSC_REDUNDANCY_TAU=0.85
# export BSC_VERIFIER=rule
# export BSC_W_COV=1.0
# export BSC_W_VALID=0.5
# export BSC_W_RED=0.5
#
# Ablations:
# no Rred:   BSC_W_RED=0.0
# no Rvalid: BSC_W_VALID=0.0 BSC_VERIFIER=none
# no verifier: BSC_VERIFIER=none
# cov only:  BSC_W_VALID=0.0 BSC_W_RED=0.0 BSC_VERIFIER=none
