### LLaMA-Factory SFT template for BlindSpot-RL.
### Replace model_name_or_path and dataset paths before real training.

stage: sft
do_train: true
model_name_or_path: meta-llama/Meta-Llama-3-8B-Instruct
dataset: blindspot_sft
dataset_dir: data/processed
template: llama3
finetuning_type: lora
output_dir: outputs/checkpoints/evaluation_criteria_policy_sft
overwrite_output_dir: true

per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 2.0e-5
num_train_epochs: 3
lr_scheduler_type: cosine
warmup_ratio: 0.03
bf16: true
cutoff_len: 4096
logging_steps: 10
save_steps: 500
plot_loss: true

### Register data/processed/blindspot_sft.jsonl in LLaMA-Factory dataset_info.json:
### "blindspot_sft": {
###   "file_name": "blindspot_sft.jsonl",
###   "columns": {"prompt": "prompt", "response": "response"}
### }
